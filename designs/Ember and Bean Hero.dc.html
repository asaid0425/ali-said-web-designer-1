<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6,400;6,500;72,400;72,500&family=Jost:wght@400;500&display=swap" rel="stylesheet" />
  <style> html, body { margin: 0; padding: 0; background: #0A0908; } </style>
</helmet>

<div style="position:relative;width:100%;height:100vh;min-height:720px;overflow:hidden;background:#0A0908;font-family:'Newsreader',Georgia,serif;color:#EDE5D4;">

  <!-- background video, full-bleed -->
  <video id="ebBg" src="assets/coffee-bg.mp4" muted loop autoplay playsinline preload="auto" aria-hidden="true" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center;display:block;z-index:0;"></video>

  <!-- nav -->
  <div style="position:absolute;top:0;left:0;right:0;z-index:5;display:flex;align-items:center;justify-content:space-between;padding:38px 64px;">
    <a href="#" style="display:inline-flex;align-items:center;gap:18px;text-decoration:none;color:#EDE5D4;">
      <svg width="26" height="34" viewBox="0 0 26 34" fill="none" aria-hidden="true"><path d="M13 1C13 1 4 9.5 4 19.5C4 26.4 8 32 13 32C18 32 22 26.4 22 19.5C22 9.5 13 1 13 1Z" fill="#B07A33"/><path d="M13 8C13 8 9 13 9 19.5C9 24 10.8 28 13 28C13 28 11 22 13 16C14.2 12.4 13 8 13 8Z" fill="#0A0908" opacity="0.55"/></svg>
      <span style="font-family:'Newsreader',serif;font-weight:500;font-size:25px;letter-spacing:0.14em;white-space:nowrap;">EMBER &amp; BEAN</span>
    </a>
    <div style="display:flex;align-items:center;gap:52px;font-family:'Jost',sans-serif;font-weight:500;font-size:14px;letter-spacing:0.2em;color:#EDE5D4;">
      <span style="cursor:pointer;">COFFEE</span>
      <span style="cursor:pointer;">ABOUT</span>
    </div>
  </div>

  <!-- hero copy -->
  <div style="position:absolute;left:64px;top:50%;transform:translateY(-50%);z-index:4;max-width:680px;">
    <h1 style="margin:0;font-family:'Newsreader',serif;font-weight:400;font-size:clamp(54px,7vw,108px);line-height:0.96;letter-spacing:-0.01em;color:#F2EBDA;">Crafted for<br/>slow mornings.</h1>
    <span style="display:block;width:84px;height:2px;background:#B07A33;margin:38px 0 32px;"></span>
    <p style="margin:0 0 44px;font-family:'Newsreader',serif;font-weight:400;font-size:clamp(19px,1.6vw,24px);line-height:1.45;color:#D9D0BE;max-width:30ch;">Small-batch coffee, roasted for depth, warmth, and ritual.</p>
    <a href="#" style="display:inline-flex;align-items:center;background:#92611F;color:#F4EEDF;text-decoration:none;font-family:'Jost',sans-serif;font-weight:500;font-size:14px;letter-spacing:0.2em;padding:22px 38px;">SHOP COFFEE</a>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{ &quot;$preview&quot;: { &quot;width&quot;: 1672, &quot;height&quot;: 941 } }">
class Component extends DCLogic {
  componentDidMount() {
    const v = document.getElementById('ebBg');
    if (!v) return;
    v.muted = true; v.loop = true; v.autoplay = true; v.playsInline = true;
    const tryPlay = () => { const p = v.play(); if (p && p.catch) p.catch(() => {}); };
    tryPlay();
    v.addEventListener('canplay', tryPlay, { once: true });
    v.addEventListener('pause', () => { if (!document.hidden) tryPlay(); });
  }
}
</script>
</body>
</html>
