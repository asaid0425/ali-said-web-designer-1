<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400;1,500&display=swap" rel="stylesheet" />
  <style> html, body { margin: 0; padding: 0; background: #EBEAE7; } </style>
</helmet>

<div style="position:relative;width:100%;height:100vh;min-height:720px;overflow:hidden;background:#EBEAE7;color:#1A1A1A;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;">

  <!-- background art video on the right -->
  <video id="afBg" src="assets/aetherform-bg.mp4" muted loop autoplay playsinline preload="auto" aria-hidden="true" style="position:absolute;top:0;right:0;width:58%;height:100%;object-fit:cover;display:block;z-index:0;"></video>
  <!-- paper fades out as it overlaps the video edge -->
  <div style="position:absolute;top:0;bottom:0;left:0;width:54%;z-index:1;background:linear-gradient(90deg,#EBEAE7 0%,#EBEAE7 74%,rgba(235,234,231,0) 100%);pointer-events:none;"></div>

  <!-- nav -->
  <div style="position:absolute;top:0;left:0;right:0;z-index:5;display:flex;align-items:center;justify-content:space-between;padding:42px 60px;">
    <span style="font-family:'Playfair Display',serif;font-weight:500;font-size:25px;letter-spacing:0.34em;color:#1A1A1A;">AETHER FORM</span>
    <div style="display:flex;align-items:center;gap:48px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:17px;font-weight:400;color:#2A2A2A;">
      <span style="cursor:pointer;">Works</span>
      <span style="cursor:pointer;">Installations</span>
      <span style="cursor:pointer;">About</span>
      <span style="cursor:pointer;">Contact</span>
    </div>
  </div>

  <!-- hero copy -->
  <div style="position:absolute;left:60px;top:50%;transform:translateY(-50%);z-index:4;max-width:640px;">
    <h1 style="margin:0;font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(56px,6.6vw,104px);line-height:0.98;letter-spacing:-0.005em;color:#171717;">Immersive<br/>forms for<br/><span style="font-style:italic;font-weight:300;">modern</span> space.</h1>
    <p style="margin:34px 0 46px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:clamp(17px,1.4vw,21px);line-height:1.5;color:#5E5E5C;max-width:34ch;">Contemporary art installations that transform space, perception, and experience.</p>
    <a href="#" style="display:inline-flex;align-items:center;gap:48px;border:1px solid #1A1A1A;color:#1A1A1A;text-decoration:none;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:14px;font-weight:500;letter-spacing:0.22em;padding:22px 30px;transition:background .4s,color .4s;" style-hover="background:#1A1A1A;color:#EBEAE7;">EXPLORE WORKS <span style="font-size:17px;letter-spacing:0;">→</span></a>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{ &quot;$preview&quot;: { &quot;width&quot;: 1672, &quot;height&quot;: 941 } }">
class Component extends DCLogic {
  componentDidMount() {
    const v = document.getElementById('afBg');
    if (!v) return;
    v.muted = true; v.loop = true; v.autoplay = true; v.playsInline = true;
    const tryPlay = () => { const p = v.play(); if (p && p.catch) p.catch(() => {}); };
    tryPlay();
    v.addEventListener('canplay', tryPlay, { once: true });
    v.addEventListener('pause', () => { if (!document.hidden) tryPlay(); });
  }
}
</script>
</body>
</html>
