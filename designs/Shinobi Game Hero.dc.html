<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+JP:wght@700;900&display=swap" rel="stylesheet" />
  <style>
    html, body { margin: 0; padding: 0; background: #080809; }
    @keyframes shCaret { 0%,100% { opacity: 1; } 50% { opacity: 0; } }
    @keyframes shScan { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }
  </style>
</helmet>

<div style="position:relative;width:100%;height:100vh;min-height:720px;overflow:hidden;background:#080809;font-family:'JetBrains Mono',monospace;color:#EDEBE3;">

  <!-- background video -->
  <video id="shBg" src="assets/shinobi-trailer.mp4" muted loop autoplay playsinline preload="auto" aria-hidden="true" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;z-index:0;opacity:1;"></video>

  <!-- giant vertical kanji: サイバ忍者 (cyber ninja) -->
  <div style="position:absolute;top:60%;right:5%;transform:translateY(-50%);z-index:2;writing-mode:vertical-rl;white-space:nowrap;font-family:'Noto Sans JP',sans-serif;font-weight:900;font-size:clamp(82px,10.5vw,158px);line-height:0.94;letter-spacing:0.01em;color:#EAE5D6;user-select:none;">サイバ忍者</div>

  <!-- nav -->
  <div style="position:absolute;top:0;left:0;right:0;z-index:6;display:flex;align-items:flex-start;justify-content:space-between;padding:34px 44px;">
    <div style="line-height:1.05;">
      <div style="font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:30px;letter-spacing:0.34em;color:#EDEBE3;">SHINOBI</div>
      <div style="font-size:11px;letter-spacing:0.34em;color:#8A877E;margin-top:5px;">// NEO-TOKYO 2084</div>
    </div>
    <div style="display:flex;align-items:center;gap:40px;font-family:'Chakra Petch',sans-serif;font-weight:500;font-size:14px;letter-spacing:0.22em;">
      <span style="position:relative;color:#EDEBE3;padding-bottom:6px;border-bottom:2px solid #EDEBE3;">GAME</span>
      <span style="color:#B7B4AB;">WORLD</span>
      <span style="color:#B7B4AB;">MEDIA</span>
      <span style="color:#B7B4AB;">NEWS</span>
      <span style="display:inline-flex;align-items:center;gap:10px;border:1px solid rgba(237,235,227,0.5);padding:14px 22px;color:#EDEBE3;letter-spacing:0.24em;">PRE-ORDER <span style="display:inline-flex;gap:2px;"><i style="width:2px;height:9px;background:#EDEBE3;transform:skewX(-20deg);display:block;"></i><i style="width:2px;height:9px;background:#EDEBE3;transform:skewX(-20deg);display:block;"></i><i style="width:2px;height:9px;background:#EDEBE3;transform:skewX(-20deg);display:block;"></i></span></span>
    </div>
  </div>

  <!-- right vertical rail -->
  <div style="position:absolute;right:30px;top:0;bottom:0;z-index:5;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:26px;">
    <span style="writing-mode:vertical-rl;font-size:11px;letter-spacing:0.46em;color:#A6A39A;">NEO-TOKYO / 2084</span>
    <span style="width:1px;height:120px;background:repeating-linear-gradient(180deg,#6f6d66 0 2px,transparent 2px 7px);"></span>
    <span style="writing-mode:vertical-rl;font-size:13px;letter-spacing:0.3em;color:#6f6d66;">: . .</span>
    <span style="width:42px;height:42px;border:1px solid rgba(237,235,227,0.5);border-radius:50%;display:grid;place-content:center;color:#EDEBE3;font-size:13px;">△</span>
    <span style="font-size:8.5px;letter-spacing:0.24em;color:#8A877E;text-align:center;line-height:1.5;">SYSTEM<br/>ONLINE</span>
  </div>

  <!-- left content block -->
  <div style="position:absolute;left:44px;top:50%;transform:translateY(-46%);z-index:5;display:flex;gap:22px;max-width:560px;">
    <span style="width:3px;align-self:stretch;background:#EDEBE3;flex:none;"></span>
    <div>
      <h1 style="margin:0;font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:clamp(26px,2.6vw,38px);letter-spacing:0.16em;color:#EDEBE3;">BECOME THE WEAPON.</h1>
      <p style="margin:24px 0 0;font-size:13.5px;line-height:2;letter-spacing:0.08em;color:#CFCCC3;text-transform:uppercase;">A cyberpunk ninja action game<br/>set in Neo-Tokyo.<br/>Infiltrate. Strike. Disappear.<br/>Your legend is coded in blood.</p>
      <div style="margin-top:18px;font-size:14px;color:#8A877E;display:flex;align-items:center;gap:2px;">✖ <span style="width:9px;height:16px;background:#EDEBE3;display:inline-block;margin-left:6px;animation:shCaret 1.1s steps(1) infinite;"></span></div>
      <button type="button" style="margin-top:36px;display:inline-flex;align-items:center;gap:18px;background:#0d0d0e;border:1px solid rgba(237,235,227,0.55);color:#EDEBE3;font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:15px;letter-spacing:0.2em;padding:20px 30px;cursor:pointer;">
        <span style="display:block;width:0;height:0;border-style:solid;border-width:8px 0 8px 13px;border-color:transparent transparent transparent #EDEBE3;"></span>
        WATCH TRAILER
      </button>
    </div>
  </div>

  <!-- bottom-left glitch deco -->
  <div style="position:absolute;left:44px;bottom:40px;z-index:5;display:flex;flex-direction:column;gap:14px;">
    <div style="display:flex;align-items:center;gap:14px;font-size:13px;color:#9c998f;letter-spacing:0.2em;"><span style="color:#EDEBE3;">▨ ✕ ✕</span><span style="letter-spacing:0.5em;color:#6f6d66;">· · · ·</span></div>
    <div style="width:230px;height:3px;background:repeating-linear-gradient(90deg,#403e39 0 7px,transparent 7px 11px);position:relative;"><span style="position:absolute;left:38%;top:-3px;width:34px;height:9px;background:#EDEBE3;"></span></div>
  </div>

  <!-- bottom-right glitch bars -->
  <div style="position:absolute;right:30px;bottom:36px;z-index:5;display:flex;gap:4px;align-items:flex-end;">
    <i style="width:5px;height:20px;background:#EDEBE3;transform:skewX(-16deg);display:block;"></i>
    <i style="width:5px;height:13px;background:#EDEBE3;transform:skewX(-16deg);display:block;"></i>
    <i style="width:5px;height:26px;background:#8A877E;transform:skewX(-16deg);display:block;"></i>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{ &quot;$preview&quot;: { &quot;width&quot;: 1672, &quot;height&quot;: 941 } }">
class Component extends DCLogic {
  componentDidMount() {
    const v = document.getElementById('shBg');
    if (!v) return;
    v.muted = true; v.loop = true; v.autoplay = true; v.playsInline = true;
    const tryPlay = () => { const p = v.play(); if (p && p.catch) p.catch(() => {}); };
    tryPlay();
    v.addEventListener('canplay', tryPlay, { once: true });
    v.addEventListener('pause', () => { if (!document.hidden) tryPlay(); });
  }
}
</script>
</body>
</html>
