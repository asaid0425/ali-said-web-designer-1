<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style> html, body { margin: 0; padding: 0; background: #0a0908; } </style>
</helmet>

<div style="position:relative;width:100%;height:100vh;min-height:760px;overflow:hidden;background:#0a0908;font-family:'Jost',-apple-system,sans-serif;">

  <!-- background video -->
  <video id="wsBg" src="assets/wellness-bg.mp4" muted loop autoplay playsinline preload="auto" aria-hidden="true" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;z-index:0;"></video>
  <!-- very light vignette only; scrim removed so the footage reads vibrant -->
  <div style="position:absolute;inset:0;z-index:1;background:radial-gradient(95% 95% at 50% 50%,transparent 62%,rgba(10,9,8,0.32) 100%);pointer-events:none;"></div>

  <!-- nav -->
  <div style="position:relative;z-index:3;display:flex;align-items:center;justify-content:space-between;padding:30px 48px;">
    <div style="font-family:'Cormorant Garamond',serif;font-weight:500;font-size:23px;letter-spacing:0.2em;text-transform:uppercase;color:#F2ECE0;">Wellness Spa</div>
    <div style="display:flex;align-items:center;gap:22px;font-size:11px;letter-spacing:0.16em;text-transform:uppercase;color:rgba(242,236,224,0.82);">
      <span style="color:#F2ECE0;border-bottom:1px solid #b89b74;padding-bottom:3px;cursor:pointer;">Home</span><span style="cursor:pointer;transition:color .25s;">About</span><span style="cursor:pointer;transition:color .25s;">Services</span><span style="cursor:pointer;transition:color .25s;">Facial</span><span style="cursor:pointer;transition:color .25s;">Massage</span><span style="cursor:pointer;transition:color .25s;">Waxing</span><span style="cursor:pointer;transition:color .25s;">Membership</span><span style="cursor:pointer;transition:color .25s;">Packages</span><span style="cursor:pointer;transition:color .25s;">Policy</span><span style="cursor:pointer;transition:color .25s;">Contact</span><span style="cursor:pointer;transition:color .25s;">Blog</span>
      <span style="background:rgba(120,104,84,0.85);color:#F4EFE5;padding:12px 22px;letter-spacing:0.2em;backdrop-filter:blur(4px);cursor:pointer;transition:background .3s,transform .3s;">Book Now</span>
    </div>
  </div>

  <!-- centered display -->
  <div style="position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;pointer-events:none;">
    <h1 style="margin:0;font-family:'Cormorant Garamond',serif;font-weight:400;font-size:clamp(90px,15vw,230px);line-height:0.86;letter-spacing:0.005em;color:#EFE7D8;text-shadow:0 4px 60px rgba(0,0,0,0.4);">wellness</h1>
    <div style="margin-top:22px;font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(20px,2.4vw,32px);letter-spacing:0.4em;text-transform:uppercase;color:#ECE3D2;text-shadow:0 2px 30px rgba(0,0,0,0.5);">Mind, Body, Soul</div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{ &quot;$preview&quot;: { &quot;width&quot;: 1440, &quot;height&quot;: 900 } }">
class Component extends DCLogic {
  componentDidMount() {
    const v = document.getElementById('wsBg');
    if (!v) return;
    // runtime drops bare boolean attrs — set as properties to guarantee autoplay loop
    v.muted = true;
    v.loop = true;
    v.autoplay = true;
    v.playsInline = true;
    const tryPlay = () => { const p = v.play(); if (p && p.catch) p.catch(() => {}); };
    tryPlay();
    v.addEventListener('canplay', tryPlay, { once: true });
    // keep it playing if anything pauses it
    v.addEventListener('pause', () => { if (!document.hidden) tryPlay(); });
  }
}
</script>
</body>
</html>
