<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet" />
  <style> html, body { margin: 0; padding: 0; background: #EFEBE2; } </style>
</helmet>

<div style="position:relative;width:100%;height:100vh;min-height:760px;background:#EFEBE2;color:#1B1814;font-family:'EB Garamond',Georgia,serif;box-sizing:border-box;padding:20px;">
  <!-- framed page -->
  <div style="position:relative;width:100%;height:100%;border:1px solid #B9B2A4;box-sizing:border-box;display:flex;flex-direction:column;">

    <!-- nav -->
    <div style="display:grid;grid-template-columns:1fr auto 1fr;align-items:center;padding:26px 40px;border-bottom:1px solid #B9B2A4;">
      <div style="display:flex;gap:34px;font-family:'EB Garamond',serif;font-size:14px;letter-spacing:0.22em;color:#3A352D;">
        <span style="cursor:pointer;">PROJECTS</span>
        <span style="cursor:pointer;">STUDIO</span>
      </div>
      <div style="font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(30px,3.4vw,46px);letter-spacing:0.16em;color:#1B1814;white-space:nowrap;">ATELIER NOIR</div>
      <div style="display:flex;gap:34px;justify-content:flex-end;font-family:'EB Garamond',serif;font-size:14px;letter-spacing:0.22em;color:#3A352D;">
        <span style="cursor:pointer;">ABOUT</span>
        <span style="cursor:pointer;">JOURNAL</span>
        <span style="cursor:pointer;">CONTACT</span>
      </div>
    </div>

    <!-- two-column body -->
    <div style="flex:1;display:grid;grid-template-columns:1fr 1fr;min-height:0;">

      <!-- left: framed media -->
      <div style="display:flex;align-items:center;justify-content:center;padding:46px 56px;border-right:1px solid #B9B2A4;min-height:0;">
        <div style="position:relative;height:100%;max-height:100%;aspect-ratio:3/4;border:1px solid #6E665A;padding:7px;box-sizing:border-box;background:#EFEBE2;">
          <div style="position:relative;width:100%;height:100%;overflow:hidden;background:#cfc7b8;">
            <video id="anBg" src="assets/ateliernoir-bg.mp4" muted loop autoplay playsinline preload="auto" aria-hidden="true" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block;"></video>
          </div>
        </div>
      </div>

      <!-- right: copy -->
      <div style="display:flex;flex-direction:column;justify-content:center;padding:46px clamp(48px,5vw,84px);">
        <h1 style="margin:0;font-family:'Cormorant Garamond',serif;font-weight:500;font-size:clamp(48px,5.6vw,86px);line-height:0.98;letter-spacing:0.005em;color:#1B1814;text-transform:uppercase;">Architecture with quiet <span style="font-style:italic;font-weight:500;text-transform:none;">presence.</span></h1>
        <p style="margin:34px 0 0;font-family:'EB Garamond',serif;font-size:clamp(17px,1.45vw,21px);line-height:1.5;color:#4A443A;max-width:34ch;">We create timeless residential and cultural spaces shaped by light, material, and proportion.</p>
        <a href="#" style="margin-top:44px;display:inline-flex;align-items:center;justify-content:center;align-self:flex-start;border:1px solid #1B1814;color:#1B1814;text-decoration:none;font-family:'EB Garamond',serif;font-size:14px;letter-spacing:0.22em;padding:20px 40px;transition:background .4s,color .4s;" style-hover="background:#1B1814;color:#EFEBE2;">VIEW PROJECTS</a>
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{ &quot;$preview&quot;: { &quot;width&quot;: 1448, &quot;height&quot;: 1086 } }">
class Component extends DCLogic {
  componentDidMount() {
    const v = document.getElementById('anBg');
    if (!v) return;
    v.muted = true; v.loop = true; v.autoplay = true; v.playsInline = true;
    const tryPlay = () => { const p = v.play(); if (p && p.catch) p.catch(() => {}); };
    tryPlay();
    v.addEventListener('canplay', tryPlay, { once: true });
    v.addEventListener('pause', () => { if (!document.hidden) tryPlay(); });
  }
}
</script>
</body>
</html>
